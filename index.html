<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel | Play7</title>
    <link rel="preload" as="image" href="https://i.ibb.co/BKvPQYkY/file-0000000085ac720eaa6f569cf3d931ac.png">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg-deep: #0f111a; --bg-card: #171a26; --primary: #00e676; --accent: #ff9100; --text: #ffffff; --border: #2d313d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-deep); color: var(--text); margin: 0; padding-bottom: 100px; }
        .header { background: rgba(23,26,38,0.9); padding: 15px 20px; border-bottom: 1px solid var(--border); position: fixed; top: 0; width: 100%; z-index: 100; backdrop-filter: blur(5px); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .user-info { font-size: 0.85rem; font-weight: 600; color: var(--primary); }
        .user-id { font-size: 0.7rem; color: #b0b3b8; }
        .balance-box { margin-top: 80px; padding: 20px; }
        .card { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border); padding: 20px; text-align: center; transition: 0.3s; }
        .balance-val { font-size: 2.5rem; color: var(--primary); font-weight: 800; margin: 5px 0; }
        .promo-banner { width: 100%; border-radius: 12px; margin-top: 15px; border: 1px solid var(--border); }
        .task-list { padding: 0 20px; }
        .task { background: var(--bg-card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: var(--primary); color: #000; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:disabled { background: #2d313d; color: #888; cursor: not-allowed; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0c12; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav a { color: #b0b3b8; text-decoration: none; font-size: 0.8rem; text-align: center; }
        .ad-container { margin: 20px 0; text-align: center; }
    </style>
</head>
<body>

    <audio id="som-sucesso" src="https://www.soundjay.com/buttons/sounds/button-37a.mp3" preload="auto"></audio>

    <div class="header">
        <div class="user-info" id="user-display">Usuário: ...</div>
        <div class="user-id" id="id-display">ID: #000000</div>
    </div>

    <div class="balance-box">
        <div class="card" id="main-card">
            <small>SEU SALDO ATUAL</small>
            <div class="balance-val" id="saldo">R$ 0,00</div>
            <small style="color:var(--accent)">Mínimo para saque: R$ 200,00</small>
            <img src="https://i.ibb.co/BKvPQYkY/file-0000000085ac720eaa6f569cf3d931ac.png" class="promo-banner" alt="Promoção">
        </div>
    </div>

    <div class="task-list">
        <h3>Missões Disponíveis 🔥</h3>
        
        <div class="task">
            <div><strong>#01</strong><br><small>Ouvir Spotify</small></div>
            <div style="color:var(--primary)">+R$ 4,50</div>
            <button class="btn" onclick="executarMissao(this, 'http://spotify.com', 4.50, 10000)">INICIAR</button>
        </div>
        <div class="task">
            <div><strong>#02</strong><br><small>Seguir Instagram</small></div>
            <div style="color:var(--primary)">+R$ 3,00</div>
            <button class="btn" onclick="executarMissao(this, 'http://instagram.com', 3.00, 5000)">INICIAR</button>
        </div>
        <div class="task">
            <div><strong>#03</strong><br><small>Avaliar App</small></div>
            <div style="color:var(--primary)">+R$ 5,00</div>
            <button class="btn" onclick="executarMissao(this, 'http://google.com', 5.00, 7000)">INICIAR</button>
        </div>
        <div class="task">
            <div><strong>#04</strong><br><small>Assistir Vídeo</small></div>
            <div style="color:var(--primary)">+R$ 2,50</div>
            <button class="btn" onclick="executarMissao(this, 'http://youtube.com', 2.50, 5000)">INICIAR</button>
        </div>
        <div class="task">
            <div><strong>#05</strong><br><small>Validar Cadastro</small></div>
            <div style="color:var(--primary)">+R$ 6,00</div>
            <button class="btn" onclick="executarMissao(this, 'http://google.com', 6.00, 8000)">INICIAR</button>
        </div>

        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://freelygreatestscammer.com/dd67faf43ae614125e2514fd79f215d3/invoke.js"></script>
            <div id="container-dd67faf43ae614125e2514fd79f215d3"></div>
        </div>
    </div>

    <div class="nav">
        <a href="#" style="color:var(--primary)">Missões</a>
        <a href="indicar.html">Indicar (R$ 5)</a>
        <a href="suporte.html">Suporte</a>
        <a href="#" onclick="tentarSaque()">Sacar</a>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApku26MbZnOV7uA3AOikunVsSmsW_E84Y", authDomain: "play7oficial-c9243.firebaseapp.com", projectId: "play7oficial-c9243", storageBucket: "play7oficial-c9243.firebasestorage.app", messagingSenderId: "234372671693", appId: "1:234372671693:web:dae3f8ab7b7952206778f9" };
        firebase.initializeApp(firebaseConfig);
        
        const nomeSalvo = localStorage.getItem('user_name') || "Convidado";
        const bonusInicial = parseFloat(localStorage.getItem('saldo_inicial')) || 0;
        let saldoLocal = parseFloat(localStorage.getItem('saldo_atual')) || bonusInicial;

        document.getElementById('user-display').innerText = "Usuário: " + nomeSalvo;
        document.getElementById('id-display').innerText = "ID: #" + Math.floor(100000 + Math.random() * 900000);
        document.getElementById('saldo').innerText = `R$ ${saldoLocal.toFixed(2).replace('.', ',')}`;

        function animarSaldo(valorFinal) {
            const elemento = document.getElementById('saldo');
            let valorExibido = parseFloat(elemento.innerText.replace('R$ ', '').replace(',', '.'));
            const passos = 25;
            const incremento = (valorFinal - valorExibido) / passos;
            let i = 0;
            const intervalo = setInterval(() => {
                valorExibido += incremento;
                elemento.innerText = `R$ ${valorExibido.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                i++;
                if (i >= passos) {
                    elemento.innerText = `R$ ${valorFinal.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                    clearInterval(intervalo);
                }
            }, 40);
        }

        function executarMissao(btn, link, valor, tempo) {
            const som = document.getElementById('som-sucesso');
            
            // "Acorda" o áudio no toque para evitar bloqueio do navegador
            som.play().then(() => { som.pause(); som.currentTime = 0; }).catch(() => {});

            // Abre o anúncio. Se o navegador bloquear, ele pedirá permissão uma única vez.
            window.open('https://freelygreatestscammer.com/dd67faf43ae614125e2514fd79f215d3/invoke.js', '_blank'); 
            
            btn.disabled = true;
            btn.innerText = "VALIDANDO...";
            btn.style.background = "var(--accent)";

            setTimeout(() => {
                // Toca o som após a validação
                som.play();

                const novoSaldo = saldoLocal + valor;
                animarSaldo(novoSaldo);
                saldoLocal = novoSaldo;
                localStorage.setItem('saldo_atual', saldoLocal);

                btn.innerText = "CONCLUÍDO ✅";
                btn.style.background = "#2d313d";

                const card = document.getElementById('main-card');
                card.style.borderColor = "var(--primary)";
                setTimeout(() => card.style.borderColor = "var(--border)", 1000);

                // Abre o link da missão depois de validar
                window.open(link, '_blank');
            }, tempo);
        }

        function tentarSaque() {
            if(saldoLocal < 200) alert('Saldo insuficiente para saque!');
            else location.href = 'saque-pix.html';
        }
    </script>
</body>
</html>
