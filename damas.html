<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Damas Premiada | Play7</title>
<style>
    :root { --bg: #0f111a; --primary: #00e676; --border: #2d313d; }
    body { background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Inter', sans-serif; color: white; margin: 0; }
    #status { margin-bottom: 15px; text-align: center; }
    #board { display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); border: 8px solid #171a26; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    .square { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; }
    .light { background: #f0d9b5; }
    .dark { background: #b58863; }
    .piece { width: 45px; height: 45px; border-radius: 50%; cursor: pointer; transition: 0.2s; }
    .red { background: #c0392b; box-shadow: inset 0 0 10px #000; }
    .black { background: #111; box-shadow: inset 0 0 10px #555; }
    .king { border: 4px solid gold; box-sizing: border-box; }
    .selected { outline: 4px solid var(--primary); outline-offset: -4px; }
    
    /* Overlay de Anúncio */
    #ad-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
    .ad-box { background: #171a26; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid var(--primary); }
</style>
</head>
<body>

<div id="status">
    <div style="font-size: 0.8rem; color: var(--primary);">MISSÃO ATIVA</div>
    <div id="msg">Capture 3 peças para ganhar R$ 0,50</div>
    <div id="saldo-box" style="font-weight: bold; margin-top: 5px;">Saldo: R$ 0,00</div>
</div>

<div id="board"></div>

<div id="ad-overlay">
    <div class="ad-box">
        <h3>Anúncio Obrigatório</h3>
        <p>Aguarde o anúncio carregar para validar seu prêmio.</p>
        <div id="ad-content">
            <small style="color: #666;">O anúncio abrirá em uma nova aba.</small>
        </div>
        <button onclick="fecharAd()" style="margin-top:20px; padding: 10px 20px; background: var(--primary); border:none; border-radius: 5px; cursor:pointer; font-weight:bold;">VOLTAR AO JOGO</button>
    </div>
</div>

<script>
const boardElement = document.getElementById("board");
let board = [];
let selected = null;
let currentPlayer = "red";
let capturas = 0;

// Carregar Saldo Atual
let saldoTotal = parseFloat(localStorage.getItem('saldo_atual')) || 0;
document.getElementById('saldo-box').innerText = "Saldo: R$ " + saldoTotal.toFixed(2).replace('.', ',');

function initBoard() {
    board = [];
    for (let r = 0; r < 8; r++) {
        board[r] = [];
        for (let c = 0; c < 8; c++) {
            if (r < 3 && (r + c) % 2 === 1) board[r][c] = {color: "black", king: false};
            else if (r > 4 && (r + c) % 2 === 1) board[r][c] = {color: "red", king: false};
            else board[r][c] = null;
        }
    }
}

function drawBoard() {
    boardElement.innerHTML = "";
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            const square = document.createElement("div");
            square.className = "square " + ((r + c) % 2 === 0 ? "light" : "dark");
            square.dataset.row = r; square.dataset.col = c;
            if (board[r][c]) {
                const piece = document.createElement("div");
                piece.className = "piece " + board[r][c].color;
                if (board[r][c].king) piece.classList.add("king");
                square.appendChild(piece);
            }
            square.addEventListener("click", handleClick);
            boardElement.appendChild(square);
        }
    }
}

function handleClick(e) {
    const r = +e.currentTarget.dataset.row;
    const c = +e.currentTarget.dataset.col;
    if (selected) {
        if (move(selected.r, selected.c, r, c)) {
            selected = null;
            drawBoard();
            setTimeout(aiMove, 400);
        } else {
            selected = null;
            drawBoard();
        }
    } else if (board[r][c] && board[r][c].color === currentPlayer) {
        selected = {r, c};
        e.currentTarget.classList.add("selected");
    }
}

function move(fr, fc, tr, tc) {
    if (!board[fr][fc]) return false;
    let piece = board[fr][fc];
    let dr = tr - fr; let dc = tc - fc;
    if (board[tr][tc] !== null) return false;
    let dir = piece.color === "red" ? -1 : 1;
    if (!piece.king && dr !== dir && dr !== 2 * dir) return false;

    if (Math.abs(dr) === 1 && Math.abs(dc) === 1) {
        board[tr][tc] = piece; board[fr][fc] = null;
        promote(tr, piece); return true;
    }

    if (Math.abs(dr) === 2 && Math.abs(dc) === 2) {
        let mr = fr + dr / 2; let mc = fc + dc / 2;
        if (board[mr][mc] && board[mr][mc].color !== piece.color) {
            board[tr][tc] = piece; board[fr][fc] = null; board[mr][mc] = null;
            promote(tr, piece);
            if(piece.color === "red") {
                capturas++;
                verificarPremio();
            }
            return true;
        }
    }
    return false;
}

function verificarPremio() {
    if(capturas >= 3) {
        // Dispara Adsterra (Popunder ou Direct Link)
        window.open('COLE_SEU_LINK_DIRETO_ADSTERRA_AQUI', '_blank');
        document.getElementById('ad-overlay').style.display = 'flex';
        capturas = 0;
    }
}

function fecharAd() {
    saldoTotal += 0.50;
    localStorage.setItem('saldo_atual', saldoTotal.toFixed(2));
    document.getElementById('saldo-box').innerText = "Saldo: R$ " + saldoTotal.toFixed(2).replace('.', ',');
    document.getElementById('ad-overlay').style.display = 'none';
    alert("Parabéns! R$ 0,50 adicionados ao seu saldo.");
}

function promote(r, piece) {
    if ((piece.color === "red" && r === 0) || (piece.color === "black" && r === 7)) piece.king = true;
}

// ... (Restante das funções AI e Minimax do seu código original) ...
function aiMove() {
    currentPlayer = "black";
    let best = minimax(board, 3, true); // Reduzi depth para performance mobile
    if (best.move) applyMove(board, best.move);
    currentPlayer = "red";
    drawBoard();
}
function minimax(state, depth, maximizing) {
    if (depth === 0) return {score: evaluate(state)};
    let moves = getAllMoves(state, maximizing ? "black" : "red");
    let bestMove = null;
    if (maximizing) {
        let maxEval = -Infinity;
        for (let m of moves) {
            let newState = JSON.parse(JSON.stringify(state));
            applyMove(newState, m);
            let evalScore = minimax(newState, depth - 1, false).score;
            if (evalScore > maxEval) { maxEval = evalScore; bestMove = m; }
        }
        return {score: maxEval, move: bestMove};
    } else {
        let minEval = Infinity;
        for (let m of moves) {
            let newState = JSON.parse(JSON.stringify(state));
            applyMove(newState, m);
            let evalScore = minimax(newState, depth - 1, true).score;
            if (evalScore < minEval) { minEval = evalScore; bestMove = m; }
        }
        return {score: minEval, move: bestMove};
    }
}
function evaluate(state) {
    let score = 0;
    for (let r of state) { for (let p of r) { if (p) score += (p.color === "black" ? 1 : -1) * (p.king ? 2 : 1); } }
    return score;
}
function getAllMoves(state, color) {
    let moves = [];
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            if (state[r][c] && state[r][c].color === color) {
                let dirs = [[1,1],[1,-1],[-1,1],[-1,-1]];
                for (let [dr,dc] of dirs) {
                    let tr = r + dr; let tc = c + dc;
                    if (valid(tr,tc) && !state[tr][tc]) moves.push({fr:r,fc:c,tr,tc});
                    let jr = r + dr*2; let jc = c + dc*2;
                    if (valid(jr,jc) && state[tr] && state[tr][tc] && state[tr][tc].color !== color && !state[jr][jc]) moves.push({fr:r,fc:c,tr:jr,tc:jc});
                }
            }
        }
    }
    return moves;
}
function applyMove(state, m) {
    let piece = state[m.fr][m.fc];
    state[m.tr][m.tc] = piece; state[m.fr][m.fc] = null;
    if (Math.abs(m.tr - m.fr) === 2) state[(m.tr+m.fr)/2][(m.tc+m.fc)/2] = null;
    if ((piece.color === "red" && m.tr === 0) || (piece.color === "black" && m.tr === 7)) piece.king = true;
}
function valid(r,c){ return r>=0 && r<8 && c>=0 && c<8; }
initBoard();
drawBoard();
</script>
</body>
</html>
