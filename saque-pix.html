<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resgatar Saldo | Play7</title>
    <style>
        * { box-sizing: border-box; } /* TRAVA DE ROLAGEM */
        :root { --bg-deep: #0f111a; --bg-card: #171a26; --primary: #00e676; --accent: #ff9100; --text: #ffffff; --border: #2d313d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-deep); color: var(--text); margin: 0; padding-bottom: 100px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        .header-simple { width: 100%; padding: 20px; text-align: center; border-bottom: 1px solid var(--border); background: var(--bg-card); }
        .container { width: 90%; max-width: 400px; margin-top: 25px; }
        
        .card-status { background: var(--bg-card); border: 1px solid var(--border); padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .progress-container { background: #0a0c12; height: 10px; border-radius: 10px; margin: 15px 0; overflow: hidden; border: 1px solid var(--border); }
        .progress-bar { background: var(--primary); height: 100%; width: 0%; transition: 1.5s cubic-bezier(0.1, 0.7, 1.0, 0.1); box-shadow: 0 0 10px var(--primary); }
        
        .pix-form { background: var(--bg-card); border: 1px solid var(--border); padding: 25px; border-radius: 20px; }
        select, input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #0a0c12; color: #fff; margin-bottom: 15px; font-size: 1rem; }
        .btn-saque { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-card { width: 85%; max-width: 350px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; padding: 30px; text-align: center; animation: popUp 0.3s ease-out; }
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        /* MENU COM ÍCONES */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0a0c12; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav a { color: #b0b3b8; text-decoration: none; font-size: 0.7rem; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav a span { font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="header-simple"><strong style="color:var(--primary)">ÁREA DE PAGAMENTO</strong></div>

    <div class="container">
        <div class="card-status">
            <small style="color:#888">SEU PROGRESSO</small>
            <div class="progress-container"><div class="progress-bar" id="barra"></div></div>
            <div style="display:flex; justify-content: space-between; font-size: 0.8rem;">
                <span id="saldo-txt" style="font-weight:bold">R$ 0,00</span>
                <span style="color:var(--primary)">Meta: R$ 200,00</span>
            </div>
        </div>

        <div class="pix-form">
            <select id="tipo"><option>PIX (Instante)</option></select>
            <select id="tipo-chave"><option>CPF</option><option>E-mail</option><option>Celular</option><option>Aleatória</option></select>
            <input type="text" id="chave" placeholder="Insira sua chave aqui">
            <button class="btn-saque" onclick="verificarSaque()">SOLICITAR SAQUE</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-card">
            <div style="font-size:40px; color:var(--accent); margin-bottom:15px;">⚠️</div>
            <div style="font-weight:800; font-size:1.2rem; color:#fff; margin-bottom:10px;">Saldo Insuficiente</div>
            <p style="font-size:0.9rem; color:#b0b3b8; line-height:1.5;">Você ainda não atingiu o mínimo de <b>R$ 200,00</b>.</p>
            <button onclick="document.getElementById('modal').style.display='none'" style="background:#2d313d; color:#fff; border:none; padding:12px; border-radius:10px; width:100%; font-weight:bold; cursor:pointer;">VOLTAR</button>
        </div>
    </div>

    <div class="nav">
        <a href="index.html"><span>🏠</span>Missões</a>
        <a href="indicar.html"><span>👥</span>Indicar</a>
        <a href="suporte.html"><span>🛠️</span>Suporte</a>
        <a href="saque-pix.html" style="color:var(--primary)"><span>💰</span>Sacar</a>
    </div>

    <script>
        const saldoLocal = parseFloat(localStorage.getItem('saldo_atual')) || 0;
        document.getElementById('saldo-txt').innerText = `R$ ${saldoLocal.toFixed(2).replace('.', ',')}`;
        setTimeout(() => {
            let pct = (saldoLocal / 200) * 100;
            document.getElementById('barra').style.width = (pct > 100 ? 100 : pct) + "%";
        }, 100);
        function verificarSaque() {
            if(!document.getElementById('chave').value) return alert("Preencha a chave PIX.");
            if(saldoLocal < 200) document.getElementById('modal').style.display = 'flex';
            else alert("Sucesso! Aguarde o processamento.");
        }
    </script>
</body>
</html>
